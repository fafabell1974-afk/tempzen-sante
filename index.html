<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TempZen Santé</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 10px; }
        .logo-main { width: 150px; margin: 20px auto; }
        .page { display: none; } /* Cache toutes les pages par défaut */
        .active { display: block; } /* Affiche seulement la page active */
        .card { background: white; padding: 20px; margin: 10px auto; border-radius: 15px; border: 1px solid #ddd; max-width: 400px; }
        input, select, textarea { width: 90%; margin: 5px; padding: 10px; }
        button { margin: 10px; padding: 12px; cursor: pointer; border-radius: 5px; }
        .btn-nav { background: #333; color: white; }
    </style>
</head>
<body>

    <img src="icon-512.png" alt="Logo" class="logo-main">

    <div id="menu">
        <button onclick="showPage('home')">🏠 Accueil</button>
        <button onclick="showPage('urgence')">🚨</button>
        <button onclick="showPage('medoc')">💊</button>
        <button onclick="showPage('rdv')">📅</button>
        <button onclick="showPage('suivi')">📊</button>
    </div>

    <div id="home" class="page active card">
        <h1>TempZen Santé</h1>
        <p>Bienvenue dans votre espace de suivi.</p>
    </div>

    <div id="urgence" class="page card">
        <h3>🚨 Urgence</h3>
        <a href="tel:15"><button style="background:red; color:white;">APPELER LE 15</button></a>
    </div>

    <div id="medoc" class="page card">
        <h3>💊 Médicaments</h3>
        <input type="text" placeholder="Nom du médicament">
        <button onclick="alert('Ajouté')">Ajouter</button>
    </div>

    <div id="rdv" class="page card">
        <h3>📅 Rendez-vous</h3>
        <input type="date">
        <input type="time">
        <button onclick="alert('RDV pris')">Enregistrer</button>
    </div>

    <div id="suivi" class="page card">
        <h3>📊 Suivi Santé</h3>
        <input type="text" placeholder="Tension / Glycémie">
        <button onclick="alert('Enregistré')">Ajouter</button>
    </div>

    <script>
        function showPage(pageId) {
            // Cache toutes les pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Affiche la page choisie
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
