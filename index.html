<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<meta name="theme-color" content="#0f766e">

<link rel="manifest" href="./manifest.json">

<link rel="stylesheet" href="./styles.css">

<title>TempZen Santé</title>

</head>


<body>


<header class="header">

<img src="./icon-192.png" class="logo">

<div>
<h1>TempZen Santé</h1>
<p>Votre assistant santé simple</p>
</div>

</header>



<nav>

<button onclick="showPage('accueil')">
🏠 Accueil
</button>

<button onclick="showPage('medicaments')">
💊 Médicaments
</button>


<button onclick="showPage('rdv')">
📅 Rendez-vous
</button>


<button onclick="showPage('suivi')">
❤️ Suivi santé
</button>


</nav>



<main>



<section id="accueil" class="page">

<h2>Bienvenue</h2>

<p>
Gérez vos médicaments, rendez-vous et suivi santé.
</p>

</section>




<section id="medicaments" class="page hidden">

<h2>💊 Mes médicaments</h2>


<input id="medNom"
placeholder="Nom du médicament">


<input id="medDose"
placeholder="Dosage / matin midi soir">


<button onclick="addMed()">
➕ Ajouter
</button>


<div id="medList"></div>


</section>





<section id="rdv" class="page hidden">


<h2>📅 Mes rendez-vous</h2>


<input id="rdvNom"
placeholder="Nom du rendez-vous">


<input id="rdvDate"
type="date">


<input id="rdvHeure"
type="time">


<button onclick="addRdv()">
➕ Ajouter
</button>


<div id="rdvList"></div>


</section>





<section id="suivi" class="page hidden">


<h2>❤️ Suivi santé</h2>


<input id="suiviTexte"
placeholder="Ex : tension 13/8">


<button onclick="addSuivi()">
➕ Ajouter
</button>


<div id="suiviList"></div>


</section>



</main>




<script src="./db.js"></script>

<script src="./app.js"></script>



</body>

</html>
