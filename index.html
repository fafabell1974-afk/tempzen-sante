<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempZen Santé</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; }
        header { background: #fff; padding: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .menu-btn { font-size: 24px; cursor: pointer; margin-right: 15px; }
        .logo-small { width: 40px; }
        
        #sideMenu { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: #333; z-index: 10; transition: 0.3s; padding-top: 60px; }
        #sideMenu a { padding: 15px; text-decoration: none; font-size: 20px; color: white; display: block; }
        
        .dashboard { text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; margin: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .time-display { font-size: 28px; font-weight: bold; color: #333; margin: 10px 0; }
        .date-display { font-size: 18px; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <img src="icon-512.png" class="logo-small">
        <h2 style="margin-left:10px;">TempZen</h2>
    </header>

    <div id="sideMenu">
        <a href="#" onclick="location.reload()">🏠 Accueil</a>
        <a href="#">🚨 Urgence</a>
        <a href="#">💊 Médicaments</a>
        <a href="#">📅 RDV</a>
    </div>

    <div class="dashboard">
        <img src="icon-512.png" style="width:120px;">
        <h1>Bonjour</h1>
        
        <div class="card">
            <div class="date-display" id="date"></div>
            <div class="time-display" id="clock"></div>
        </div>

        <div class="card" style="border-left: 5px solid #28a745;">
            <h3>📅 Prochain RDV</h3>
            <p id="nextRdv">Aucun RDV prévu pour le moment.</p>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("sideMenu");
            menu.style.width = (menu.style.width === "250px") ? "0" : "250px";
        }

        // Mise à jour heure et date
        function updateClock() {
            const now = new Date();
            document.getElementById('date').innerText = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
