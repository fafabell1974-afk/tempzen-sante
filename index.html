<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempZen Santé</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <header>TempZen Santé</header>
    <img src="icon-512.png" class="icon-512" style="width:150px; display:block; margin: 20px auto;">

    <div class="card">
        <h3>Médicaments</h3>
        <input type="text" id="nomMedoc" placeholder="Nom du médicament">
        <input type="text" id="doseMedoc" placeholder="Dose">
        <button onclick="ajouterMedoc()" class="btn-vert">Ajouter</button>
        <div id="listeMedocs"></div>
    </div>

    <div class="card">
        <h3>Suivi de santé</h3>
        <input type="text" id="typeMesure" placeholder="Type (ex: Tension)">
        <input type="text" id="valeurMesure" placeholder="Valeur">
        <button onclick="ajouterSuivi()" class="btn-vert">Ajouter</button>
        <div id="listeSuivi"></div>
    </div>

    <button onclick="genererVraiPDF()" style="width:90%; margin:20px 5%; padding:15px;">Télécharger mon carnet (PDF)</button>

    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
