<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempZen Santé</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 10px; }
        .card { background: white; padding: 15px; margin: 10px auto; border-radius: 10px; border: 1px solid #ddd; max-width: 400px; }
        input, textarea { width: 90%; margin: 5px; padding: 10px; box-sizing: border-box; }
        button { margin: 5px; padding: 10px; cursor: pointer; }
        .btn-sup { background-color: #ffcccc; border: 1px solid red; }
    </style>
</head>
<body>

    <h1>TempZen Santé</h1>

    <!-- 1. Urgence -->
    <div class="card">
        <h3>🚨 Urgence</h3>
        <a href="tel:15"><button style="background:red; color:white; font-weight:bold;">APPELER LE 15</button></a>
    </div>

    <!-- 2. Médicaments -->
    <div class="card">
        <h3>💊 Médicaments</h3>
        <input type="text" id="nomMedoc" placeholder="Nom du médicament">
        <button onclick="ajouter('medoc')">Ajouter</button>
        <button class="btn-sup" onclick="supprimer('medoc')">Supprimer</button>
    </div>

    <!-- 3. Notes -->
    <div class="card">
        <h3>📝 Notes</h3>
        <textarea id="noteText" placeholder="Votre note..."></textarea>
        <button onclick="ajouter('note')">Ajouter</button>
        <button class="btn-sup" onclick="supprimer('note')">Supprimer</button>
    </div>

    <!-- 4. RDV -->
    <div class="card">
        <h3>📅 Rendez-vous</h3>
        <input type="text" id="rdvDesc" placeholder="Description du RDV">
        <button onclick="ajouter('rdv')">Ajouter</button>
        <button class="btn-sup" onclick="supprimer('rdv')">Supprimer</button>
    </div>

    <!-- Sauvegarde PDF -->
    <div class="card">
        <button onclick="genererPDF()" style="background:gold;">💾 Sauvegarder mon carnet (PDF)</button>
    </div>

    <script>
        function ajouter(cat) { alert("Action ajouter pour : " + cat); }
        function supprimer(cat) { 
            if(confirm("Voulez-vous supprimer les données de " + cat + " ?")) { 
                alert("Données de " + cat + " supprimées."); 
            } 
        }
        function genererPDF() { alert("Génération du PDF en cours..."); }
    </script>
</body>
</html>
