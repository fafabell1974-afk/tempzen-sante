<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css">

<title>TempZen Santé</title>
</head>

<body>

<div class="app">

<header>
<img src="./icon-192.png" width="80">
<h1>TempZen Santé</h1>
</header>


<nav id="navDropdown">
<button onclick="setView('accueil')">Accueil</button>
<button onclick="setView('rdv')">Rendez-vous</button>
<button onclick="setView('medicaments')">Médicaments</button>
<button onclick="setView('suivi')">Suivi santé</button>
</nav>


<section id="accueil">
<h2>Bienvenue</h2>
</section>


<section id="section-rdv" class="hidden">

<h2>📅 Rendez-vous</h2>

<input id="rdvTitle" placeholder="Nom du rendez-vous">
<input id="rdvDate" type="date">
<input id="rdvNote" placeholder="Note">

<button onclick="saveRdv()">Ajouter</button>

<div id="rdvList"></div>

</section>



<section id="section-medicaments" class="hidden">

<h2>💊 Médicaments</h2>

<input id="medName" placeholder="Nom du médicament">

<input id="medDose" placeholder="Dosage / matin midi soir">

<button onclick="saveMed()">Ajouter</button>

<div id="medList"></div>

</section>



<section id="section-suivi" class="hidden">

<h2>❤️ Suivi santé</h2>

<input id="suiviType" placeholder="Type">

<input id="suiviValue" placeholder="Valeur">

<button onclick="saveSuivi()">Ajouter</button>

<div id="suiviList"></div>

</section>


</div>


<script src="./db.js"></script>
<script src="./app.js"></script>


</body>
</html>
