<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TempZen</title>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; }
        header { background: #fff; padding: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .menu-btn { font-size: 30px; cursor: pointer; padding: 10px; }
        #sideMenu { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: #333; z-index: 10; transition: 0.3s; padding-top: 70px; }
        #sideMenu a { padding: 15px 20px; display: block; color: white; text-decoration: none; font-size: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="menu-btn" onclick="document.getElementById('sideMenu').style.width='250px'">☰</div>
        <h2>TempZen</h2>
    </header>
    <div id="sideMenu">
        <a href="#" onclick="showPage('home')">Accueil 🏠</a>
        <a href="#" onclick="showPage('medoc')">Médicaments 💊</a>
        <a href="#" onclick="showPage('suivi')">Suivi Santé 📊</a>
    </div>
    <div id="content" class="container"></div>
</body>
</html>
