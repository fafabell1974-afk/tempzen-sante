<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A2540">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TempZen">
  <meta name="description" content="Gérez vos médicaments et suivez votre santé au quotidien.">
  <title>TempZen</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="menu-btn" onclick="openMenu()" aria-label="Menu" role="button" tabindex="0">
      <span></span><span></span><span></span>
    </div>
    <div class="header-logo">
      <div class="logo-mark">🩺</div>
      <h2>Temp<span>Zen</span></h2>
    </div>
  </header>

  <!-- ── Side Menu ── -->
  <div id="sideMenuOverlay" onclick="closeMenu()"></div>

  <nav id="sideMenu" role="navigation" aria-label="Navigation principale">
    <div class="side-menu-header">
      <span class="app-name">🩺 TempZen</span>
      <div class="side-close-btn" onclick="closeMenu()" role="button" tabindex="0" aria-label="Fermer">✕</div>
    </div>

    <div class="side-menu-section">
      <div class="side-menu-label">Navigation</div>
      <a href="#" data-page="home"    onclick="showPage('home');    return false;">
        <span class="nav-icon">🏠</span> Accueil
      </a>
      <a href="#" data-page="urgence" onclick="showPage('urgence'); return false;">
        <span class="nav-icon">🚨</span> Urgences
      </a>
      <a href="#" data-page="medoc"   onclick="showPage('medoc');   return false;">
        <span class="nav-icon">💊</span> Médicaments
      </a>
      <a href="#" data-page="suivi"   onclick="showPage('suivi');   return false;">
        <span class="nav-icon">📊</span> Suivi Santé
      </a>
    </div>
  </nav>

  <!-- ── Main ── -->
  <main id="content" role="main"></main>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
