<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>TempZen</title>
</head>
<body>
    <header>
        <div class="menu-btn" onclick="document.getElementById('sideMenu').style.width='250px'">☰</div>
        <h2>TempZen</h2>
    </header>
    <div id="sideMenu">
        <a href="#" onclick="showPage('home')">Accueil 🏠</a>
        <a href="#" onclick="showPage('urgence')">Urgence 🚨</a>
        <a href="#" onclick="showPage('medoc')">Médicaments 💊</a>
        <a href="#" onclick="showPage('suivi')">Suivi Santé 📊</a>
    </div>
    <div id="content"></div>

    <script src="db.js"></script>
    <script src="app.js"></script>
    <script>
        function showPage(page) {
            document.getElementById('sideMenu').style.width = '0';
            const div = document.getElementById('content');
            if(page === 'home') div.innerHTML = `<div class="card"><h1>Bienvenue</h1><p>Gérez votre santé en toute sérénité.</p></div>`;
            else if(page === 'urgence') div.innerHTML = `<div class="card"><h1>Urgence</h1><a href="tel:15"><button class="btn-red">APPELER LE 15</button></a></div>`;
            else if(page === 'medoc') {
                div.innerHTML = `<div class="card"><h1>Médicaments</h1><input id="nomMedoc" placeholder="Nom"><input id="doseMedoc" placeholder="Dose"><button onclick="ajouterMedoc()">Ajouter</button><div id="listeMedocs"></div></div>`;
                chargerMedocs();
            } else if(page === 'suivi') {
                div.innerHTML = `<div class="card"><h1>Suivi Santé</h1><input id="typeMesure" placeholder="Type"><input id="valeurMesure" placeholder="Valeur"><button onclick="ajouterSuivi()">Ajouter</button><div id="listeSuivi"></div></div>`;
                chargerSuivi();
            }
        }
        showPage('home');
    </script>
</body>
</html>
