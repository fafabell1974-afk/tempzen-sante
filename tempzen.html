<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempZen Santé</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f5f7fa; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        button { background: #004080; color: white; border: none; padding: 15px 20px; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TempZen Santé</h1>
        <p>Bienvenue dans votre carnet de suivi personnel.</p>
        <button onclick="telechargerPDF()">Télécharger mon carnet PDF</button>
    </div>

    <script>
        function telechargerPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Carnet de Santé TempZen", 20, 20);
            doc.text("Vos données sont ici.", 20, 30);
            doc.save("mon-carnet-sante.pdf");
        }
    </script>
</body>
</html>
